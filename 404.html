<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stackly</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="error-page">
    <div class="error-container">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-6 col-md-8 text-center">
                    <div class="error-content animate__animated animate__fadeIn">
                        <div class="error-icon mb-4">
                            <i class="fas fa-exclamation-triangle fa-5x"></i>
                        </div>
                        <h1 class="error-code">404</h1>
                        <h2 class="error-title mb-3">Page Not Found</h2>
                        <p class="error-description mb-4">
                            Oops! The page you are looking for doesn't exist or has been moved. 
                            This feature may not be available yet or you may have clicked on an external link.
                        </p>
                        
                        <div class="error-actions">
                            <button onclick="goBack()" class="btn btn-primary btn-lg mb-2">
                                <i class="fas fa-arrow-left"></i> Go Back
                            </button>
                            <a href="index.html" class="btn btn-outline-primary btn-lg mb-2">
                                <i class="fas fa-home"></i> Go to Homepage
                            </a>
                        </div>

                        

                        <div class="mt-5">
                            <p class="text-muted">
                                <i class="fas fa-shield-alt"></i> Protected by Stackly Security
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function goBack() {
            // Check if there's a previous page in history
            if (document.referrer && document.referrer !== '') {
                window.history.back();
            } else {
                // If no referrer, go to homepage
                window.location.href = 'index.html';
            }
        }

        // Add keyboard shortcut: Press Escape to go back
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape') {
                goBack();
            }
        });
    </script>
</body>
</html>
